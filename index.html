<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101828">
    <title>Skyline Flutter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Skyline Flutter game">
      <section class="stage-wrap">
        <canvas id="game" width="960" height="640" aria-label="Flappy bird style arcade game" role="img"></canvas>
        <div class="hud" aria-live="polite">
          <div class="score-card">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-card">
            <span>Best</span>
            <strong id="best">0</strong>
          </div>
          <button id="pauseBtn" class="icon-button" type="button" aria-label="Pause game" title="Pause">
            <span aria-hidden="true">II</span>
          </button>
        </div>
        <div id="overlay" class="overlay">
          <div class="mark" aria-hidden="true">S</div>
          <h1>Skyline Flutter</h1>
          <p>Dart through glowing city gates. Tap, click, or press Space to lift.</p>
          <button id="startBtn" type="button">Start Flight</button>
        </div>
      </section>
      <div class="controls" aria-hidden="true">
        <span>Space</span>
        <span>Click</span>
        <span>Tap</span>
      </div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
